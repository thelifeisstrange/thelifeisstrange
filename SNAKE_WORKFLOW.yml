# ─────────────────────────────────────────────────────────────────
#  Place this file in your GitHub profile repo at:
#    thelifeisstrange/.github/workflows/snake.yml
#
#  Then go to: Actions tab → "Generate Snake" → Run workflow
#  Once it runs, the snake SVGs are saved to the `output` branch
#  and the README snake section will become visible automatically.
# ─────────────────────────────────────────────────────────────────

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # auto-regenerates daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: thelifeisstrange
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
